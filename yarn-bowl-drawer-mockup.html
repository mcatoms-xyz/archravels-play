<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yarn Bowl Drawer — Mockup</title>
<style>
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #2b2118; color: #fdf6e8; margin: 0; padding: 18px; overflow-x: hidden; }
  h1 { font-size: 1.15rem; margin: 0 0 4px; }
  .sub { color: #cbb891; font-size: .85rem; margin-bottom: 12px; max-width: 640px; }
  .controls { margin-bottom: 12px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: .85rem; }
  button.open-btn { background: #3769BE; color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-weight: 700; cursor: pointer; }

  /* ---------- the drawer ---------- */
  .bowl-drawer {
    position: fixed; top: var(--dy, 50%); left: 0;
    width: min(var(--sz, 46vmin), 480px); height: min(var(--sz, 46vmin), 480px);
    transform: translate(-115%, -50%);
    transition: transform .45s cubic-bezier(.3, 1.25, .5, 1);
    z-index: 400; pointer-events: none;
  }
  .bowl-drawer.open { transform: translate(var(--dx, -16%), -50%); pointer-events: auto; }
  /* tangled refusal: quick shove-out-and-back */
  .bowl-drawer.refuse { animation: refuse .5s ease; }
  @keyframes refuse {
    0%, 100% { transform: translate(-115%, -50%); }
    35%      { transform: translate(-96%, -50%) rotate(-3deg); }
  }

  .bowl-wheel {
    position: absolute; inset: 11.5%;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: inset 0 6px 18px rgba(0,0,0,.45);
  }
  .bowl-wheel svg { width: 100%; height: 100%; display: block; }
  .bowl-rim { position: absolute; inset: 0; width: 100%; height: 100%; filter: drop-shadow(6px 8px 14px rgba(0,0,0,.5)); }
  .wedge-count {
    position: absolute; left: 50%; top: 50%;
    font-weight: 800; font-size: clamp(18px, 4.6vmin, 34px); color: #fff;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 2px 5px rgba(0,0,0,.8);
    transform: translate(-50%, -50%);
  }
  .bowl-yarnball { position: absolute; width: 17%; left: 50%; top: 50%; transform: translate(-50%,-50%); filter: drop-shadow(0 3px 5px rgba(0,0,0,.4)); }

  /* tangled cat slumped over the drawer edge when blocked */
  .drawer-cat {
    position: fixed; left: -6px; top: calc(50% - 10vmin);
    width: 20vmin; transform: scaleX(-1) rotate(-18deg);
    filter: drop-shadow(2px 5px 6px rgba(0,0,0,.5));
    z-index: 401; display: none; pointer-events: none;
  }
  body.tangled .drawer-cat { display: block; }
  .tangle-toast {
    position: fixed; left: 18px; top: calc(50% + 12vmin);
    background: #7a2e22; color: #ffe9df; font-weight: 700; font-size: .9rem;
    padding: 8px 14px; border-radius: 10px; z-index: 402;
    opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .tangle-toast.show { opacity: 1; }

  /* fake board area to click (stands in for the token column / bowl art zone) */
  .fake-board { position: relative; width: min(680px, 92vw); border-radius: 10px; overflow: hidden; container-type: inline-size; }
  .fake-board img.board { width: 100%; display: block; }

  /* yarn token column — live-game calibrated (6.12% tokens, 0.64% gap, 2.73% count) */
  .tok-col { position: absolute; top: 5%; left: 0; width: 9%; height: 70%;
    display: flex; flex-direction: column; justify-content: space-around; align-items: center;
    padding: 4% 0; box-sizing: border-box; pointer-events: none; }
  .tok-col .tok { position: relative; display: flex; align-items: center; justify-content: center;
    width: 100%; margin: 0.64cqw 0; }
  .tok-col .tok img { width: 6.12cqw; height: 6.12cqw; display: block; }
  .tok-col .tok span { position: absolute; font-weight: 800; font-size: 2.73cqw; line-height: 1; color: #fff;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 0 2px 4px rgba(0,0,0,.8); }

  /* on-board tangled cat — Adam's tuned values (48Q) */
  .board-cat { position: absolute; left: 3%; top: 53%; width: 26.5%; height: auto;
    z-index: 5; pointer-events: none; display: none;
    transform: scaleX(-1) rotate(-29deg);
    filter: drop-shadow(2px 5px 5px rgba(0,0,0,.38));
    animation: bc-pounce 2.4s ease-in-out infinite; }
  body.tangled .board-cat { display: block; }
  @keyframes bc-pounce {
    0%, 100% { transform: scaleX(-1) rotate(-29deg) translateY(0); }
    50%      { transform: scaleX(-1) rotate(-25deg) translateY(-4%); }
  }
  .bowl-hotzone {
    position: absolute; top: 3%; left: 0; width: 14%; height: 74%;
    cursor: pointer; border-radius: 8px;
    outline: 2px dashed rgba(255, 211, 122, .0); transition: outline-color .2s, background .2s;
  }
  .bowl-hotzone:hover { background: rgba(255, 211, 122, .12); outline-color: rgba(255, 211, 122, .55); }
  .hotzone-hint { position: absolute; top: 1%; left: 15%; font-size: .75rem; color: #ffd37a; background: rgba(0,0,0,.45); padding: 3px 8px; border-radius: 6px; }
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.35); opacity: 0; pointer-events: none; transition: opacity .35s; z-index: 390; }
  .scrim.on { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
<h1>🥣 Yarn Bowl Drawer — Mockup</h1>
<div class="sub">Tap the yarn-token zone on the board (dashed on hover) to slide the bowl in from the left. Toggle Tangled to see the refusal: drawer bumps, cat's got it. Tap anywhere outside to close.</div>
<div class="controls">
  <label><input type="checkbox" id="tangledToggle"> 😾 Tangled (drawer blocked)</label>
  <button class="open-btn" onclick="openDrawer()">Or just open it</button>
  <label>Open-X <input type="range" id="sDX" min="-60" max="20" step="1" value="-16" style="vertical-align:middle"></label>
  <label>Vertical <input type="range" id="sDY" min="20" max="80" step="1" value="50" style="vertical-align:middle"></label>
  <label>Size <input type="range" id="sSZ" min="26" max="80" step="1" value="46" style="vertical-align:middle"></label>
  <span id="sVals" style="color:#ffd37a; font-size:.8rem"></span>
</div>

<div class="fake-board">
  <img class="board" src="Player Boards PNG/AR_PlayerBoards_Final.2.13__0000_t1-rebecca.png" alt="board">
  <div class="tok-col" id="tokCol"></div>
  <img class="board-cat" src="Other Images Textures Details/AR_cat_meeple_GRAY_3D.png" alt="">
  <div class="bowl-hotzone" onclick="openDrawer()" title="Yarn Bowl"></div>
  <div class="hotzone-hint">← tap the token column zone</div>
</div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="bowl-drawer" id="drawer">
  <div class="bowl-wheel" id="wheel"></div>
  <img class="bowl-rim" src="Other Images Textures Details/AR_yarn_bowl_rim.png" alt="">
</div>
<img class="drawer-cat" src="Other Images Textures Details/AR_cat_meeple_GRAY_3D.png" alt="Tangled Cat">
<div class="tangle-toast" id="toast">😾 The Tangled Cat has your bowl!</div>

<script>
  // sample counts, bowl order
  var counts = { red: 3, orange: 1, yellow: 0, green: 2, blue: 4, purple: 1 };
  var order = ['red', 'orange', 'yellow', 'green', 'blue', 'purple'];

  // yarn token column on the board (the tap target for the drawer)
  (function(){
    var col = document.getElementById('tokCol');
    order.forEach(function(c){
      var d = document.createElement('div');
      d.className = 'tok';
      d.innerHTML = '<img src="Wood Yarn Tokens PNG/' + c + '.png" alt=""><span>' + counts[c] + '</span>';
      col.appendChild(d);
    });
  })();

  // SVG wedge wheel: red starts at 12 o'clock going clockwise, so the top
  // pair reads purple (left) / red (right). Fabric pattern per wedge, that
  // color's token at wedge center with the count on it, wood-brown middle.
  (function(){
    var NS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', '0 0 200 200');
    var defs = document.createElementNS(NS, 'defs');
    order.forEach(function(c){
      var p = document.createElementNS(NS, 'pattern');
      p.setAttribute('id', 'fab-' + c);
      p.setAttribute('patternUnits', 'userSpaceOnUse');
      p.setAttribute('width', '200'); p.setAttribute('height', '200');
      var im = document.createElementNS(NS, 'image');
      im.setAttribute('href', 'Other Images Textures Details/Textures/FabricPlain0015_ar_' + c + '.png');
      im.setAttribute('width', '200'); im.setAttribute('height', '200');
      im.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      p.appendChild(im); defs.appendChild(p);
    });
    svg.appendChild(defs);
    function pt(aDeg, r){ var a = aDeg * Math.PI / 180; return [100 + r * Math.sin(a), 100 - r * Math.cos(a)]; }
    order.forEach(function(c, k){
      var a0 = k * 60, a1 = (k + 1) * 60, R = 102;
      var p1 = pt(a0, R), p2 = pt(a1, R);
      var path = document.createElementNS(NS, 'path');
      path.setAttribute('d', 'M100,100 L' + p1[0] + ',' + p1[1] + ' A' + R + ',' + R + ' 0 0 1 ' + p2[0] + ',' + p2[1] + ' Z');
      path.setAttribute('fill', 'url(#fab-' + c + ')');
      path.setAttribute('stroke', 'rgba(60,38,18,.55)');
      path.setAttribute('stroke-width', '1.2');
      svg.appendChild(path);
      // token + count at wedge center
      var mid = pt(a0 + 30, 62), TW = 34;
      var tok = document.createElementNS(NS, 'image');
      tok.setAttribute('href', 'Wood Yarn Tokens PNG/' + c + '.png');
      tok.setAttribute('x', mid[0] - TW/2); tok.setAttribute('y', mid[1] - TW/2);
      tok.setAttribute('width', TW); tok.setAttribute('height', TW);
      svg.appendChild(tok);
      var txt = document.createElementNS(NS, 'text');
      txt.setAttribute('x', mid[0]); txt.setAttribute('y', mid[1]);
      txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('dominant-baseline', 'central');
      txt.setAttribute('font-size', '15'); txt.setAttribute('font-weight', '800');
      txt.setAttribute('fill', '#fff'); txt.setAttribute('stroke', '#000'); txt.setAttribute('stroke-width', '3');
      txt.setAttribute('paint-order', 'stroke'); txt.setAttribute('font-family', 'inherit');
      txt.textContent = counts[c];
      svg.appendChild(txt);
    });
    // wood bowl bottom
    var dot = document.createElementNS(NS, 'circle');
    dot.setAttribute('cx', '100'); dot.setAttribute('cy', '100'); dot.setAttribute('r', '24');
    dot.setAttribute('fill', '#5a3c20'); dot.setAttribute('stroke', '#3f2a15'); dot.setAttribute('stroke-width', '3');
    svg.appendChild(dot);
    document.getElementById('wheel').appendChild(svg);
  })();

  // ---- drawer placement sliders ----
  (function(){
    var drawer = document.getElementById('drawer');
    function upd(){
      var dx = document.getElementById('sDX').value, dy = document.getElementById('sDY').value, sz = document.getElementById('sSZ').value;
      drawer.style.setProperty('--dx', dx + '%');
      drawer.style.setProperty('--dy', dy + '%');
      drawer.style.setProperty('--sz', sz + 'vmin');
      document.getElementById('sVals').textContent = 'open-x ' + dx + '% · vertical ' + dy + '% · size ' + sz + 'vmin';
    }
    ['sDX','sDY','sSZ'].forEach(function(id){ document.getElementById(id).addEventListener('input', upd); });
    upd();
  })();

  var drawer = document.getElementById('drawer');
  var scrim = document.getElementById('scrim');
  // cat appears the moment Tangled is on — he's guarding the drawer
  document.getElementById('tangledToggle').addEventListener('change', function(){
    document.body.classList.toggle('tangled', this.checked);
    if (this.checked) closeDrawer();
  });
  function openDrawer() {
    var tangled = document.getElementById('tangledToggle').checked;
    document.body.classList.toggle('tangled', tangled);
    if (tangled) {
      drawer.classList.remove('refuse'); void drawer.offsetWidth;
      drawer.classList.add('refuse');
      var t = document.getElementById('toast');
      t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 1600);
      return;
    }
    drawer.classList.add('open'); scrim.classList.add('on');
  }
  function closeDrawer() { drawer.classList.remove('open'); scrim.classList.remove('on'); }
</script>
</body>
</html>
