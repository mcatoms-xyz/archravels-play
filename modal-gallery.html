<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchRavels — Modal Gallery (QA)</title>
<style>
  :root{ --bg:#1d150d; --panel:#2a1f14; --line:#46372480; --ink:#f0e6d2; --muted:#b8a888; --gold:#d9a521; --accent:#3769BE; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif; }
  .topbar{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:10px 14px; background:linear-gradient(180deg,#3a2e1f,#241a10); border-bottom:1px solid #00000040; position:sticky; top:0; z-index:10; }
  .topbar h1{ font-size:15px; margin:0; color:var(--gold); white-space:nowrap; }
  .topbar .hint{ font-size:11.5px; color:var(--muted); max-width:520px; line-height:1.3; }
  .vp-group{ display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
  button.ctl{ font:inherit; font-size:12.5px; padding:6px 11px; border-radius:7px; border:1px solid #ffffff22; background:#ffffff12; color:var(--ink); cursor:pointer; }
  button.ctl:hover{ background:#ffffff20; }
  button.ctl.active{ background:var(--gold); color:#241a10; border-color:var(--gold); font-weight:700; }
  .wrap{ display:flex; min-height:calc(100% - 50px); }
  .side{ width:230px; flex:0 0 230px; background:var(--panel); border-right:1px solid #00000050; padding:10px; overflow-y:auto; max-height:calc(100vh - 50px); position:sticky; top:50px; }
  .side .grp{ font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:14px 4px 6px; }
  .side button{ display:block; width:100%; text-align:left; font:inherit; font-size:13px; padding:8px 10px; margin:4px 0; border-radius:7px; border:1px solid #ffffff14; background:#ffffff0c; color:var(--ink); cursor:pointer; }
  .side button:hover{ background:#ffffff1a; border-color:var(--gold); }
  .stage{ flex:1 1 auto; display:flex; flex-direction:column; align-items:center; padding:18px; gap:10px; min-width:0; }
  .sizeread{ font-size:12px; color:var(--muted); }
  .frame{ background:#000; border-radius:14px; box-shadow:0 16px 50px #000000aa, 0 0 0 1px #ffffff14; overflow:hidden; transition:width .15s, height .15s; max-width:100%; }
  iframe{ border:0; display:block; width:100%; height:100%; background:#c2aa83; }
  .log{ width:100%; max-width:900px; font-size:11.5px; color:var(--muted); background:#00000040; border:1px solid #ffffff14; border-radius:8px; padding:8px 10px; min-height:34px; white-space:pre-wrap; }
  .log b{ color:var(--gold); }
  .log .err{ color:#ff8a7a; }
  @media (max-width:780px){
    .wrap{ flex-direction:column; }
    .side{ width:100%; flex:none; position:static; max-height:none; display:grid; grid-template-columns:1fr 1fr; gap:4px 8px; }
    .side .grp{ grid-column:1 / -1; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>🧶 Modal Gallery</h1>
    <div class="hint">Boots a real 3-player game in the frame, then pops each modal so you can check layout, scroll &amp; clipping. Open this on a phone/TV and hit <b>Fill</b> to test that device's real viewport.</div>
    <div class="vp-group">
      <button class="ctl" data-w="390" data-h="844">📱 Phone</button>
      <button class="ctl" data-w="768" data-h="1024">📲 Tablet</button>
      <button class="ctl" data-w="1280" data-h="720">🖥️ TV</button>
      <button class="ctl" data-w="fill" data-h="fill">↔ Fill</button>
      <button class="ctl" id="reboot">⟳ Reboot</button>
    </div>
  </div>

  <div class="wrap">
    <div class="side" id="side"></div>
    <div class="stage">
      <div class="sizeread" id="sizeread">—</div>
      <div class="frame" id="frame"><iframe id="stage" src="index.html"></iframe></div>
      <div class="log" id="log">Loading game…</div>
    </div>
  </div>

<script>
(function(){
  var iframe = document.getElementById('stage');
  var frameBox = document.getElementById('frame');
  var sizeread = document.getElementById('sizeread');
  var logEl = document.getElementById('log');
  var ready = false;

  function log(msg, isErr){ logEl.innerHTML = '<b>' + new Date().toLocaleTimeString() + '</b> · ' + (isErr ? '<span class="err">'+msg+'</span>' : msg); }
  function W(){ return iframe.contentWindow; }
  function D(){ return iframe.contentWindow.document; }

  // ---- boot a real game inside the frame ----
  function boot(n){
    n = n || 3;
    try{
      var w = W();
      // cards.js declares `const CARDS` (lexical, not on window) — expose the game
      // globals onto the iframe window so the gallery can reach them cross-frame.
      try{ w.eval("try{window.CARDS=CARDS}catch(e){} try{window.Game=Game}catch(e){} try{window.UI=UI}catch(e){} try{window.AI=AI}catch(e){} try{window.Story=Story}catch(e){} try{window.Sound=Sound}catch(e){}"); }catch(e){}
      var C = w.CARDS, G = w.Game, UI = w.UI;
      if(!C || !G || !UI){ return false; }
      var ids = Object.keys(C.characters).filter(function(c){ return c!=='hank'; }).slice(0, n);
      G.init({ players: ids.map(function(id,i){ return { characterId:id, name:C.getCharacter(id).name, isAI: i>0 }; }) });
      var ls = D().getElementById('landingScreen'); if(ls) ls.style.display='none';
      UI.renderAll();
      ready = true;
      log('Game booted — ' + n + ' players (' + ids.join(', ') + '). Pick a modal →');
      return true;
    }catch(e){ log('Boot failed: ' + e.message, true); return false; }
  }

  // hide every modal/overlay before showing a new one
  function closeAll(){
    var d = D(); if(!d) return;
    ['.modal-overlay','.opponent-panel','.opponent-panel-backdrop','.history-panel','.history-panel-backdrop'].forEach(function(sel){
      Array.prototype.forEach.call(d.querySelectorAll(sel), function(el){ el.style.display='none'; });
    });
    ['eventModal','yarnSaleModal','donateModal','srTakeModal','gameMomentModal','gameOverModal','colorModal','craftConfirmModal','tangledCatModal','finishProjectModal','learnPatternModal','frogItModal','take5Modal']
      .forEach(function(id){ var el=d.getElementById(id); if(el) el.style.display='none'; });
  }

  function run(label, fn){
    // Re-boot a FRESH game before every modal so state never leaks between triggers
    // (e.g. a scorecard's New Game button bleeding onto the next modal).
    if(!boot(3)){ log('Game not ready yet — try Reboot.', true); return; }
    try{ closeAll(); fn(W()); log('Showing: <b>'+label+'</b>'); }
    catch(e){ log('“'+label+'” errored: ' + e.message, true); }
  }
  var noop = function(){};
  // Event cards in CARDS.events carry a BARE filename; the real game deck prefixes
  // 'Square Cards PNG/'. Mirror that so the gallery shows the real card preview.
  function evt(w, effect){
    var e = (w.CARDS.events||[]).filter(function(x){return x.effect===effect;})[0];
    if(!e) return e;
    var img = e.img && e.img.indexOf('/')===-1 ? ('Square Cards PNG/' + e.img) : e.img;
    return Object.assign({}, e, { img: img });
  }
  function activePlayer(w){ return w.Game.state.player; }

  // ---- modal catalog ----
  var MODALS = [
    { grp:'Event reveal' },
    { label:'Event — Yarn Sale',     run:function(w){ w.UI.showEventModal(evt(w,'yarnSale'), noop); } },
    { label:'Event — Donate',        run:function(w){ w.UI.showEventModal(evt(w,'donate'), noop); } },
    { label:'Event — Tangled Cat',   run:function(w){ w.UI.showEventModal(evt(w,'tangledCat'), noop); } },
    { label:'Event — Friendly Clerk',run:function(w){ w.UI.showEventModal(evt(w,'friendlyClerk'), noop); } },
    { label:'Event — Craft Circle',  run:function(w){ w.UI.showEventModal(evt(w,'craftCircle'), noop); } },

    { grp:'Event resolution (the scrollers)' },
    { label:'Yarn Sale picker',      run:function(w){ w.UI.showYarnSaleModal(noop); } },
    { label:'Donate picker',         run:function(w){ w.UI.showDonateModal(noop); } },
    { label:'Friendly Clerk picker', run:function(w){ w.UI.showFriendlyClerkModal(noop); } },
    { label:'Tangled Cat picker',    run:function(w){ w.UI.showTangledCatModal(noop); } },
    { label:'Color picker',          run:function(w){ w.UI.showColorPicker(noop, 'Choose a Yarn Color', activePlayer(w), true); } },
    { label:'Take 5 Any Colors',     run:function(w){ w.UI.showTake5Modal(); } },

    { grp:'Special Requests' },
    { label:'SR Take (found an SR)', run:function(w){ w.UI.showSRTakeModal(w.CARDS.specialRequests[0], noop); } },

    { grp:'Crafting' },
    { label:'Craft Confirm',         run:function(w){
        var def = w.CARDS.getItem ? w.CARDS.getItem('hat') : w.CARDS.items[0];
        w.UI._pendingCraft = { type:'item', itemId:def.id, itemDef:def, yarnToSpend:{ red:1, blue:1, yellow:1 } };
        w.UI.showCraftConfirm();
      } },
    { label:'Learn Pattern',         run:function(w){ w.UI.showLearnPatternModal(); } },
    { label:'Finish Project',        run:function(w){
        var p = activePlayer(w);
        try{ var def = w.CARDS.getItem ? w.CARDS.getItem('hat') : w.CARDS.items[0]; p.items = p.items || []; if(!p.items.length){ p.items.push(Object.assign({}, def)); p.items.push(Object.assign({}, def)); } }catch(e){}
        w.UI.showFinishProjectModal();
      } },
    { label:'Frog It',               run:function(w){
        var p = activePlayer(w);
        try{ var def = w.CARDS.getItem ? w.CARDS.getItem('scarf') : w.CARDS.items[0]; p.items = p.items || []; if(!p.items.length) p.items.push(Object.assign({}, def)); }catch(e){}
        w.UI.showFrogItModal();
      } },
    { label:'Craft — yarn picker',   run:function(w){
        var def = Object.assign({}, (w.CARDS.getItem ? w.CARDS.getItem('bear') : w.CARDS.items[0]), { colorRule:'any', yarnCount:3 });
        w.UI.showCraftColorPicker(def, 'Choose 3 Yarn');
      } },
    { label:'Craft Circle (event)',  run:function(w){ w.UI.showCraftCircleModal(0, noop); } },
    { label:'Final Craft phase',     run:function(w){ try{ w.Game.state.phase='finalCraft'; }catch(e){} if(w.UI.showFinalCraftPhase) w.UI.showFinalCraftPhase(); } },
    { label:'Exchange yarn',         run:function(w){ if(w.UI.showExchangeModal) w.UI.showExchangeModal(); } },

    { grp:'Moments & end' },
    { label:'Game Moment',           run:function(w){ w.UI.showGameMoment({ title:'Snugglesaurus', points:9, badge:'Special Request', desc:'A cozy little dino, crafted with care.' }, noop); } },
    { label:'Game Over scorecard',   run:function(w){ w.UI.showGameOverModal(); } },

    { grp:'Side panels' },
    { label:'Opponent board viewer', run:function(w){ w.UI.showOpponentPanel(1); } },
    { label:'Turn History',          run:function(w){ if(w.UI.showTurnHistory) w.UI.showTurnHistory(); } },
  ];

  var side = document.getElementById('side');
  MODALS.forEach(function(m){
    if(m.grp){ var g=document.createElement('div'); g.className='grp'; g.textContent=m.grp; side.appendChild(g); return; }
    var b=document.createElement('button'); b.textContent=m.label;
    b.onclick=function(){ run(m.label, m.run); };
    side.appendChild(b);
  });

  // ---- viewport presets ----
  function setVP(w, h, btn){
    Array.prototype.forEach.call(document.querySelectorAll('.vp-group .ctl'), function(b){ if(b.id!=='reboot') b.classList.remove('active'); });
    if(w==='fill'){
      frameBox.style.width='100%'; frameBox.style.height='calc(100vh - 130px)';
      sizeread.textContent='Fill — this device’s viewport';
    } else {
      frameBox.style.width=w+'px'; frameBox.style.height=h+'px';
      sizeread.textContent=w+' × '+h+' px';
    }
    if(btn) btn.classList.add('active');
  }
  Array.prototype.forEach.call(document.querySelectorAll('.vp-group .ctl'), function(b){
    if(b.id==='reboot'){ b.onclick=function(){ ready=false; iframe.src='index.html'; log('Rebooting…'); }; return; }
    b.onclick=function(){ setVP(b.dataset.w, b.dataset.h, b); };
  });

  iframe.addEventListener('load', function(){
    // give the game JS a beat to define UI/Game
    var tries=0;
    (function wait(){ tries++; if(boot(3)) return; if(tries<25) setTimeout(wait, 200); else log('Game did not initialize — check console.', true); })();
  });

  // default viewport: phone (most viewport issues live there)
  setVP('390','844', document.querySelector('.vp-group .ctl'));
})();
</script>
</body>
</html>
