<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchRavels — Modal Gallery (QA)</title>
<style>
  :root{ --bg:#1d150d; --panel:#2a1f14; --line:#46372480; --ink:#f0e6d2; --muted:#b8a888; --gold:#d9a521; --accent:#3769BE; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink); font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif; }
  .topbar{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:10px 14px; background:linear-gradient(180deg,#3a2e1f,#241a10); border-bottom:1px solid #00000040; position:sticky; top:0; z-index:10; }
  .topbar h1{ font-size:15px; margin:0; color:var(--gold); white-space:nowrap; }
  .topbar .hint{ font-size:11.5px; color:var(--muted); max-width:520px; line-height:1.3; }
  .vp-group{ display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
  button.ctl{ font:inherit; font-size:12.5px; padding:6px 11px; border-radius:7px; border:1px solid #ffffff22; background:#ffffff12; color:var(--ink); cursor:pointer; }
  button.ctl:hover{ background:#ffffff20; }
  button.ctl.active{ background:var(--gold); color:#241a10; border-color:var(--gold); font-weight:700; }
  .wrap{ display:flex; min-height:calc(100% - 50px); }
  .side{ width:230px; flex:0 0 230px; background:var(--panel); border-right:1px solid #00000050; padding:10px; overflow-y:auto; max-height:calc(100vh - 50px); position:sticky; top:50px; }
  .side .grp{ font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:14px 4px 6px; }
  .side button{ display:block; width:100%; text-align:left; font:inherit; font-size:13px; padding:8px 10px; margin:4px 0; border-radius:7px; border:1px solid #ffffff14; background:#ffffff0c; color:var(--ink); cursor:pointer; }
  .side button:hover{ background:#ffffff1a; border-color:var(--gold); }
  .stage{ flex:1 1 auto; display:flex; flex-direction:column; align-items:center; padding:18px; gap:10px; min-width:0; }
  .sizeread{ font-size:12px; color:var(--muted); }
  .frame{ position:relative; background:#000; border-radius:14px; box-shadow:0 16px 50px #000000aa, 0 0 0 1px #ffffff14; overflow:hidden; transition:width .15s, height .15s, border-radius .15s; max-width:100%; }
  iframe{ border:0; display:block; width:100%; height:100%; background:#c2aa83; position:relative; z-index:1; }
  /* iOS safe-area overlays (Dynamic Island / notch + home-indicator bar) */
  .safe{ position:absolute; left:0; right:0; z-index:5; pointer-events:none; display:none; align-items:center; justify-content:center;
         background:rgba(215,165,33,0.10); }
  .safe-top{ top:0; flex-direction:column; justify-content:flex-end; border-bottom:1px dashed rgba(215,165,33,0.6); }
  .safe-bottom{ bottom:0; flex-direction:column; justify-content:flex-start; border-top:1px dashed rgba(215,165,33,0.6); }
  .safe-tag{ font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,238,200,0.75); padding:2px 0; }
  .island{ width:118px; height:30px; background:#000; border-radius:18px; box-shadow:0 0 0 1px #ffffff22; margin-bottom:5px; display:none; }
  .home-ind{ width:140px; height:5px; background:rgba(255,255,255,0.85); border-radius:3px; margin-top:5px; }
  .log{ width:100%; max-width:900px; font-size:11.5px; color:var(--muted); background:#00000040; border:1px solid #ffffff14; border-radius:8px; padding:8px 10px; min-height:34px; white-space:pre-wrap; }
  .log b{ color:var(--gold); }
  .log .err{ color:#ff8a7a; }
  @media (max-width:780px){
    .wrap{ flex-direction:column; }
    .side{ width:100%; flex:none; position:static; max-height:none; display:grid; grid-template-columns:1fr 1fr; gap:4px 8px; }
    .side .grp{ grid-column:1 / -1; }
  }
</style>
</head>
<body>
  <div class="topbar">
    <h1>🧶 Modal Gallery</h1>
    <div class="hint">Boots a real 3-player game, then pops each modal/toast so you can tune layout per device. Pick an <b>iOS target viewport</b> (safe areas show the Dynamic Island + home-bar insets), or <b>Web</b> for desktop. <b>Fill</b> = this device's real viewport.</div>
    <div class="vp-group">
      <button class="ctl" data-dev="iphone">📱 iPhone</button>
      <button class="ctl" data-dev="promax">📱 Pro Max</button>
      <button class="ctl" data-dev="ipad">📲 iPad</button>
      <button class="ctl" data-dev="web">🖥️ Web</button>
      <button class="ctl" data-dev="fill">↔ Fill</button>
      <button class="ctl" id="safeToggle">🛡 Safe areas: on</button>
      <button class="ctl" id="nativeToggle">📱 App UI (cap-native): on</button>
      <button class="ctl" id="reboot">⟳ Reboot</button>
    </div>
  </div>

  <div class="wrap">
    <div class="side" id="side"></div>
    <div class="stage">
      <div class="sizeread" id="sizeread">—</div>
      <div class="frame" id="frame">
        <iframe id="stage" src="index.html"></iframe>
        <div class="safe safe-top" id="safeTop"><div class="island"></div><span class="safe-tag">safe area</span></div>
        <div class="safe safe-bottom" id="safeBottom"><span class="safe-tag">safe area</span><div class="home-ind"></div></div>
      </div>
      <div class="log" id="log">Loading game…</div>
    </div>
  </div>

<script>
(function(){
  var iframe = document.getElementById('stage');
  var frameBox = document.getElementById('frame');
  var sizeread = document.getElementById('sizeread');
  var logEl = document.getElementById('log');
  var ready = false;
  var nativeOn = true;
  // Force the in-app (Capacitor) styling onto the booted game so the gallery shows
  // the ACTUAL iOS app UI — not the web layout — at phone size. Re-applied on every boot.
  function applyNative(){ try{
      var b = D() && D().body; if(!b) return;
      b.classList.toggle('cap-native', nativeOn);
      // Simulate the device's real safe-area insets so cap-native env() rules (now --sat/--sab)
      // render like the sim — content sits BELOW the notch instead of splitting on it.
      var d = (typeof DEVICES !== 'undefined' && DEVICES[currentDev]) || {};
      var t = (nativeOn && !d.fill) ? (d.top || 0) : 0;
      var bo = (nativeOn && !d.fill) ? (d.bottom || 0) : 0;
      b.style.setProperty('--sat', t + 'px');
      b.style.setProperty('--sab', bo + 'px');
    }catch(e){} }

  function log(msg, isErr){ logEl.innerHTML = '<b>' + new Date().toLocaleTimeString() + '</b> · ' + (isErr ? '<span class="err">'+msg+'</span>' : msg); }
  function W(){ return iframe.contentWindow; }
  function D(){ return iframe.contentWindow.document; }

  // ---- boot a real game inside the frame ----
  function boot(n){
    n = n || 3;
    try{
      var w = W();
      // cards.js declares `const CARDS` (lexical, not on window) — expose the game
      // globals onto the iframe window so the gallery can reach them cross-frame.
      try{ w.eval("try{window.CARDS=CARDS}catch(e){} try{window.Game=Game}catch(e){} try{window.UI=UI}catch(e){} try{window.AI=AI}catch(e){} try{window.Story=Story}catch(e){} try{window.Sound=Sound}catch(e){}"); }catch(e){}
      var C = w.CARDS, G = w.Game, UI = w.UI;
      if(!C || !G || !UI){ return false; }
      var ids = Object.keys(C.characters).filter(function(c){ return c!=='hank'; }).slice(0, n);
      G.init({ players: ids.map(function(id,i){ return { characterId:id, name:C.getCharacter(id).name, isAI: i>0 }; }) });
      var ls = D().getElementById('landingScreen'); if(ls) ls.style.display='none';
      UI.renderAll();
      ready = true;
      applyNative();
      log('Game booted — ' + n + ' players (' + ids.join(', ') + '). Pick a modal →');
      return true;
    }catch(e){ log('Boot failed: ' + e.message, true); return false; }
  }

  // hide every modal/overlay before showing a new one
  function closeAll(){
    var d = D(); if(!d) return;
    ['.modal-overlay','.opponent-panel','.opponent-panel-backdrop','.history-panel','.history-panel-backdrop'].forEach(function(sel){
      Array.prototype.forEach.call(d.querySelectorAll(sel), function(el){ el.style.display='none'; });
    });
    ['eventModal','yarnSaleModal','donateModal','srTakeModal','gameMomentModal','gameOverModal','colorModal','craftConfirmModal','tangledCatModal','finishProjectModal','learnPatternModal','frogItModal','take5Modal']
      .forEach(function(id){ var el=d.getElementById(id); if(el) el.style.display='none'; });
    // Session 43: dynamically-created warning modals — remove them entirely
    ['snagWarnModal','emergencyWarnModal','catNapPairModal','endActionsWarnModal','hankBeatModal']
      .forEach(function(id){ var el=d.getElementById(id); if(el) el.remove(); });
  }

  function run(label, fn){
    // Re-boot a FRESH game before every modal so state never leaks between triggers
    // (e.g. a scorecard's New Game button bleeding onto the next modal).
    if(!boot(3)){ log('Game not ready yet — try Reboot.', true); return; }
    try{ closeAll(); fn(W()); log('Showing: <b>'+label+'</b>'); }
    catch(e){ log('“'+label+'” errored: ' + e.message, true); }
  }
  var noop = function(){};
  // Event cards in CARDS.events carry a BARE filename; the real game deck prefixes
  // 'Square Cards PNG/'. Mirror that so the gallery shows the real card preview.
  function evt(w, effect){
    var e = (w.CARDS.events||[]).filter(function(x){return x.effect===effect;})[0];
    if(!e) return e;
    var img = e.img && e.img.indexOf('/')===-1 ? ('Square Cards PNG/' + e.img) : e.img;
    return Object.assign({}, e, { img: img });
  }
  function activePlayer(w){ return w.Game.state.player; }

  // ---- modal catalog ----
  var MODALS = [
    { grp:'Event reveal' },
    { label:'Event — Yarn Sale',     run:function(w){ w.UI.showEventModal(evt(w,'yarnSale'), noop); } },
    { label:'Event — Donate',        run:function(w){ w.UI.showEventModal(evt(w,'donate'), noop); } },
    { label:'Event — Tangled Cat',   run:function(w){ w.UI.showEventModal(evt(w,'tangledCat'), noop); } },
    { label:'Event — Friendly Clerk',run:function(w){ w.UI.showEventModal(evt(w,'friendlyClerk'), noop); } },
    { label:'Event — Craft Circle',  run:function(w){ w.UI.showEventModal(evt(w,'craftCircle'), noop); } },

    { grp:'Event resolution (the scrollers)' },
    { label:'Yarn Sale picker',      run:function(w){ w.UI.showYarnSaleModal(noop); } },
    { label:'Donate picker',         run:function(w){ w.UI.showDonateModal(noop); } },
    { label:'Friendly Clerk picker', run:function(w){ w.UI.showFriendlyClerkModal(noop); } },
    { label:'Tangled Cat picker',    run:function(w){ w.UI.showTangledCatModal(noop); } },
    { label:'Color picker',          run:function(w){ w.UI.showColorPicker(noop, 'Choose a Yarn Color', activePlayer(w), true); } },
    { label:'Take 5 Any Colors',     run:function(w){ w.UI.showTake5Modal(); } },

    { grp:'Special Requests' },
    { label:'SR Take (found an SR)', run:function(w){ w.UI.showSRTakeModal(w.CARDS.specialRequests[0], noop); } },

    { grp:'Hank Automa (S43)' },
    { label:'SR Take — keep or Give to Hank', run:function(w){
        w.Game.state.hankAutoma = true;
        w.UI.showSRTakeModal(w.CARDS.specialRequests[0], noop);
      } },
    { label:'SR Take — gnome-forced keep (High Demand)', run:function(w){
        w.Game.state.hankAutoma = true;
        w.Game.state.activeGnomeRule = { fx:'highDemand', name:'High Demand' };
        w.UI.showSRTakeModal(w.CARDS.specialRequests[0], noop);
      } },
    { label:'Snagged! block modal (green: items)', run:function(w){
        var d = w.CARDS.snaggedProjects.filter(function(x){return x.id==='urgentRequest';})[0];
        w.Game.state.activeSnagReminder = w.CARDS.makeSnaggedCard(d, 'easy');
        w.UI._showSnagBlockWarning();
      } },
    { label:'Snagged! block modal (hard: SR)', run:function(w){
        var d = w.CARDS.snaggedProjects.filter(function(x){return x.id==='urgentRequest';})[0];
        w.Game.state.activeSnagReminder = w.CARDS.makeSnaggedCard(d, 'hard');
        w.Game.state._snagSRdone = false;
        w.UI._showSnagBlockWarning();
      } },
    { label:'Urgent Request pill (on project row)', run:function(w){
        var d = w.CARDS.snaggedProjects.filter(function(x){return x.id==='urgentRequest';})[0];
        w.Game.state.hankAutoma = true;
        w.Game.state.enforceSnagReminder = true;
        w.Game.state.activeSnagReminder = w.CARDS.makeSnaggedCard(d, 'hard');
        w.Game.state._snagSRdone = false;
        w.UI.renderProjectStrip();
      } },
    { label:'Emergency! block modal', run:function(w){
        var sr = w.CARDS.specialRequests[0];
        var p = activePlayer(w);
        p.specialRequests.push({ uid:'gal_em', name:sr.name, img:sr.img, points:sr.points });
        w.Game.state.hankAutoma = true;
        w.Game.state.activeGnomeRule = { fx:'emergency', name:'Emergency!' };
        w.Game.state.emergencySRUid = 'gal_em';
        w.UI._showEmergencyBlockWarning();
      } },
    { label:'Cat Nap — place (1 color, Light)', run:function(w){
        w.Game.state.hankAutoma = true;
        var d = w.CARDS.tangledYarn.filter(function(x){return x.id==='catNap';})[0];
        w.Game.state.hankReveals = [{ kind:'catNapPick', card:w.CARDS.makeTangledCard(d,'light') }];
        w.UI.playHankReveals(noop);
      } },
    { label:'Cat Nap — place (2 adjacent, Hard)', run:function(w){
        w.Game.state.hankAutoma = true;
        var d = w.CARDS.tangledYarn.filter(function(x){return x.id==='catNap';})[0];
        w.Game.state.hankReveals = [{ kind:'catNapPick', card:w.CARDS.makeTangledCard(d,'hard') }];
        w.UI.playHankReveals(noop);
      } },
    { label:'Cat Nap — bowl badges + locked pickers', run:function(w){
        var d = w.CARDS.tangledYarn.filter(function(x){return x.id==='catNap';})[0];
        w.Game.state.hankAutoma = true;
        w.Game.state.activeGnomeRule = w.CARDS.makeTangledCard(d,'hard');
        w.Game.state.catNapColors = ['red','orange'];
        w.UI.renderYarnBowl();
        w.UI.showColorPicker(noop, 'Gain 1 yarn (red + orange napped 🐱)', activePlayer(w), true);
      } },
    { label:'Gnome Rule board slot', run:function(w){
        var d = w.CARDS.tangledYarn.filter(function(x){return x.id==='yarnRation';})[0];
        w.Game.state.hankAutoma = true;
        w.Game.state.activeGnomeRule = w.CARDS.makeTangledCard(d,'hard');
        if(w.UI.renderGnomeRule) w.UI.renderGnomeRule();
      } },
    { label:'Tangled Yarn reveal (confetti + meow)', run:function(w){
        var d = w.CARDS.tangledYarn.filter(function(x){return x.id==='blazingNeedles';})[0];
        w.Game.state.hankAutoma = true;
        w.Game.state.hankReveals = [{ kind:'tangledYarn', card:w.CARDS.makeTangledCard(d,'hard') }];
        w.UI.playHankReveals(noop);
      } },
    { label:'Craft Circle — Hank free Blanket moment', run:function(w){
        w.Game.state.hankAutoma = true;
        w.Game.state.players.push({ name:'Hank', isAutoma:true, isAI:false, yarnBowl:{red:0,orange:0,yellow:0,green:0,blue:0,purple:0}, items:[], specialRequests:[], craftedSpecialRequests:[], patternTiles:[], projects:[] });
        w.Game.state.playerCount = w.Game.state.players.length;
        w.UI.showCraftCircleModal(w.Game.state.players.length - 1, noop);
      } },
    { label:'Event — Donate (to Hank copy)', run:function(w){
        w.Game.state.hankAutoma = true;
        w.UI.showEventModal(evt(w,'donate'), noop);
      } },
    { label:'Event — Tangled Cat (hits YOU copy)', run:function(w){
        w.Game.state.hankAutoma = true;
        w.UI.showEventModal(evt(w,'tangledCat'), noop);
      } },
    { label:'Hank’s Turn beat (shopping + Yarn3 anim)', run:function(w){
        w.Game.state.hankAutoma = true;
        w.Game.state._hankBeat = { amount:3, color:'orange', colors:['orange','yellow','green'], score:41, turn:7, bowl:{} };
        w.UI.showHankTurnBeat();
      } },

    { grp:'Crafting' },
    { label:'Craft Confirm',         run:function(w){
        var def = w.CARDS.getItem ? w.CARDS.getItem('hat') : w.CARDS.items[0];
        w.UI._pendingCraft = { type:'item', itemId:def.id, itemDef:def, yarnToSpend:{ red:1, blue:1, yellow:1 } };
        w.UI.showCraftConfirm();
      } },
    { label:'Learn Pattern',         run:function(w){ w.UI.showLearnPatternModal(); } },
    { label:'Finish Project',        run:function(w){
        var p = activePlayer(w);
        try{ var def = w.CARDS.getItem ? w.CARDS.getItem('hat') : w.CARDS.items[0]; p.items = p.items || []; if(!p.items.length){ p.items.push(Object.assign({}, def)); p.items.push(Object.assign({}, def)); } }catch(e){}
        w.UI.showFinishProjectModal();
      } },
    { label:'Frog It',               run:function(w){
        var p = activePlayer(w);
        try{ var def = w.CARDS.getItem ? w.CARDS.getItem('scarf') : w.CARDS.items[0]; p.items = p.items || []; if(!p.items.length) p.items.push(Object.assign({}, def)); }catch(e){}
        w.UI.showFrogItModal();
      } },
    { label:'Craft — yarn picker',   run:function(w){
        var def = Object.assign({}, (w.CARDS.getItem ? w.CARDS.getItem('bear') : w.CARDS.items[0]), { colorRule:'any', yarnCount:3 });
        w.UI.showCraftColorPicker(def, 'Choose 3 Yarn');
      } },
    { label:'Craft Circle (event)',  run:function(w){ w.UI.showCraftCircleModal(0, noop); } },
    { label:'Final Craft phase',     run:function(w){ try{ w.Game.state.phase='finalCraft'; }catch(e){} if(w.UI.showFinalCraftPhase) w.UI.showFinalCraftPhase(); } },
    { label:'Exchange yarn',         run:function(w){ if(w.UI.showExchangeModal) w.UI.showExchangeModal(); } },
    { label:'Craft Options (make)',  run:function(w){ var p=w.Game.state.player; p.yarnBowl={red:5,blue:5,green:5,yellow:5,orange:5,purple:5}; if(w.UI.showCraftOptionsModal) w.UI.showCraftOptionsModal(); } },

    { grp:'Moments & end' },
    { label:'Game Moment',           run:function(w){ w.UI.showGameMoment({ title:'Snugglesaurus', points:9, badge:'Special Request', desc:'A cozy little dino, crafted with care.' }, noop); } },
    { label:'Game Over scorecard',   run:function(w){ w.UI.showGameOverModal(); } },

    { grp:'Achievement toasts' },
    { label:'Achievement toast',     run:function(w){ if(w.Story&&w.Story.achievementToast) w.Story.achievementToast({name:'Pattern Buff', pts:25}); else log('Story not ready', true); } },
    { label:'Achievement toasts ×3 (stack)', run:function(w){
        if(!w.Story||!w.Story.achievementToast){ log('Story not ready', true); return; }
        [{name:'Yarn Hoarder',pts:10},{name:'Show Off',pts:25},{name:'Crowd Pleaser',pts:25}]
          .forEach(function(a,i){ setTimeout(function(){ w.Story.achievementToast(a); }, i*550); });
      } },

    { grp:'Side panels' },
    { label:'Opponent board viewer', run:function(w){ w.UI.showOpponentPanel(1); } },
    { label:'Turn History',          run:function(w){ if(w.UI.showTurnHistory) w.UI.showTurnHistory(); } },
  ];

  var side = document.getElementById('side');
  MODALS.forEach(function(m){
    if(m.grp){ var g=document.createElement('div'); g.className='grp'; g.textContent=m.grp; side.appendChild(g); return; }
    var b=document.createElement('button'); b.textContent=m.label;
    b.onclick=function(){ run(m.label, m.run); };
    side.appendChild(b);
  });

  // ---- device viewport presets (iOS launch targets + web) ----
  // top/bottom = iOS safe-area insets in CSS px (Dynamic Island + home indicator).
  var DEVICES = {
    iphone: { w:393, h:852,  top:59, bottom:34, island:true,  radius:46, label:'iPhone 16 / 15 · 393 × 852' },
    promax: { w:430, h:932,  top:59, bottom:34, island:true,  radius:50, label:'iPhone 16 Pro Max · 430 × 932' },
    ipad:   { w:820, h:1180, top:24, bottom:20, island:false, radius:22, label:'iPad · 820 × 1180' },
    web:    { w:1280,h:800,  top:0,  bottom:0,  island:false, radius:12, label:'Web / Desktop · 1280 × 800' },
    fill:   { fill:true, radius:10, label:'Fill — this device’s viewport' }
  };
  var safeTop = document.getElementById('safeTop');
  var safeBottom = document.getElementById('safeBottom');
  var islandEl = safeTop.querySelector('.island');
  var safeOn = true;
  var currentDev = 'iphone';

  function paintSafe(d){
    var hasInsets = !d.fill && (d.top>0 || d.bottom>0);
    var show = safeOn && hasInsets;
    safeTop.style.display    = (show && d.top>0)    ? 'flex' : 'none';
    safeBottom.style.display = (show && d.bottom>0) ? 'flex' : 'none';
    if(!d.fill){ safeTop.style.height = d.top+'px'; safeBottom.style.height = d.bottom+'px'; }
    islandEl.style.display = (show && d.island) ? 'block' : 'none';
  }
  function applyDevice(key, btn){
    var d = DEVICES[key]; if(!d) return;
    currentDev = key;
    Array.prototype.forEach.call(document.querySelectorAll('.vp-group .ctl'), function(b){ if(b.dataset.dev) b.classList.remove('active'); });
    if(d.fill){
      frameBox.style.width='100%'; frameBox.style.height='calc(100vh - 150px)';
    } else {
      frameBox.style.width=d.w+'px'; frameBox.style.height=d.h+'px';
    }
    frameBox.style.borderRadius=(d.radius||12)+'px';
    paintSafe(d);
    sizeread.textContent = d.label + (safeOn && !d.fill && (d.top||d.bottom) ? '  ·  safe areas shown' : '');
    if(btn) btn.classList.add('active');
    applyNative();   // re-apply cap-native + simulated safe-area insets for the new device
  }
  Array.prototype.forEach.call(document.querySelectorAll('.vp-group .ctl'), function(b){
    if(b.id==='reboot'){ b.onclick=function(){ ready=false; iframe.src='index.html'; log('Rebooting…'); }; return; }
    if(b.id==='safeToggle'){ b.onclick=function(){
      safeOn=!safeOn; b.textContent='🛡 Safe areas: '+(safeOn?'on':'off'); b.classList.toggle('active', safeOn);
      applyDevice(currentDev, document.querySelector('.vp-group .ctl[data-dev="'+currentDev+'"]'));
    }; b.classList.add('active'); return; }
    if(b.id==='nativeToggle'){ b.onclick=function(){
      nativeOn=!nativeOn; b.textContent='📱 App UI (cap-native): '+(nativeOn?'on':'off'); b.classList.toggle('active', nativeOn); applyNative();
    }; b.classList.add('active'); return; }
    b.onclick=function(){ applyDevice(b.dataset.dev, b); };
  });

  iframe.addEventListener('load', function(){
    // give the game JS a beat to define UI/Game
    var tries=0;
    (function wait(){ tries++; if(boot(3)) return; if(tries<25) setTimeout(wait, 200); else log('Game did not initialize — check console.', true); })();
  });

  // default viewport: primary iPhone target
  applyDevice('iphone', document.querySelector('.vp-group .ctl[data-dev="iphone"]'));
})();
</script>
</body>
